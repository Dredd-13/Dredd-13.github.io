{{ define "main" }}
<style>
.terminal-wrap {
  max-width: 860px;
  margin: 40px auto;
  font-family: 'Courier New', monospace;
}
.terminal-window {
  background: #1a1a1a;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.terminal-header {
  background: #2d2d2d;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot.red    { background: #ff5f57; }
.dot.yellow { background: #ffbd2e; }
.dot.green  { background: #28ca41; }
.terminal-title { color: #888; font-size: 13px; margin-left: 8px; }
.terminal-body {
  padding: 24px;
  color: #e0e0e0;
  font-size: 14px;
  line-height: 1.8;
  min-height: 400px;
}
.prompt  { color: #50fa7b; margin-right: 8px; }
.command { color: #f1fa8c; }
.cursor  {
  display: inline-block;
  width: 9px; height: 16px;
  background: #e0e0e0;
  vertical-align: middle;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }
.terminal-output { margin-top: 24px; display: none; }
.terminal-output h2 { color: #50fa7b; margin-top: 24px; }
.terminal-output h2::before { content: ""; }
.terminal-output ul { list-style: none; padding-left: 0; }
.terminal-output ul li::before { content: "→ "; color: #ff79c6; }
.terminal-output a { color: #8be9fd; }
</style>

<div class="terminal-wrap">
  <div class="terminal-window">
    <div class="terminal-header">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <span class="terminal-title">dredd@blog: ~</span>
    </div>
    <div class="terminal-body">
      <div>
        <span class="prompt">dredd@blog:~$</span>
        <span class="command" id="cmd"></span><span class="cursor" id="cursor"></span>
      </div>
      <div class="terminal-output" id="output">
        {{ .Content }}
      </div>
    </div>
  </div>
</div>

<script>
const command = "whoami";
const cmdEl  = document.getElementById("cmd");
const cursor = document.getElementById("cursor");
const output = document.getElementById("output");

// Teclea el comando
let i = 0;
function type() {
  if (i < command.length) {
    cmdEl.textContent += command[i++];
    setTimeout(type, 120);
  } else {
    setTimeout(showContent, 400);
  }
}

// Muestra el contenido sección por sección
function showContent() {
  cursor.style.display = "none";
  output.style.display = "block";

  // Oculta todos los hijos directos del output
  const children = Array.from(output.children);
  children.forEach(el => {
    el.style.opacity = "0";
    el.style.transform = "translateY(6px)";
    el.style.transition = "opacity 0.4s ease, transform 0.4s ease";
  });

  // Los va mostrando uno a uno con delay
  children.forEach((el, index) => {
    setTimeout(() => {
      el.style.opacity = "1";
      el.style.transform = "translateY(0)";
    }, index * 300);
  });
}

setTimeout(type, 800);
</script>
{{ end }}
