

<script>

  (function() {
  const toggle = document.getElementById('theme-toggle');
  if (!toggle) return;
  
  const html = document.documentElement;
  const iconDark = document.getElementById('icon-dark');
  const iconLight = document.getElementById('icon-light');
  
  // Cargar tema guardado o usar dark por defecto
  const savedTheme = localStorage.getItem('theme') || 'dark';
  html.classList.toggle('dark', savedTheme === 'dark');
  updateIcons();
  
  toggle.addEventListener('click', function() {
    html.classList.toggle('dark');
    const isDark = html.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    updateIcons();
  });
  
  function updateIcons() {
    const isDark = html.classList.contains('dark');
    if (iconDark) iconDark.style.display = isDark ? 'none' : 'block';
    if (iconLight) iconLight.style.display = isDark ? 'block' : 'none';
  }
})();

</script>

<script>
// ============================================
// ONDA BINARIA ASCII ART
// ============================================
(function() {
  const container = document.getElementById('ascii-container');
  const asciiNormal = document.getElementById('ascii-normal');
  const asciiBinary = document.getElementById('ascii-binary');
  
  if (!container || !asciiNormal || !asciiBinary) return;
  
  const originalText = asciiNormal.textContent;
  let animationId = null;
  let startTime = null;
  
  function generateBinaryWave(time) {
    let result = '';
    let charIndex = 0;
    
    for (let i = 0; i < originalText.length; i++) {
      const char = originalText[i];
      
      if (char === ' ' || char === '\n') {
        result += char;
      } else {
        const wave = Math.tan((charIndex * 0.05) + (time * 0.0025));
        if (wave > 0.01) {
          result += Math.random() > 0.5 ? '1' : '0';
        } else {
          result += char;
        }
        charIndex++;
      }
    }
    
    return result;
  }
  
  function animate(timestamp) {
    if (!startTime) startTime = timestamp;
    const elapsed = timestamp - startTime;
    
    asciiBinary.textContent = generateBinaryWave(elapsed);
    animationId = requestAnimationFrame(animate);
  }
  
  container.addEventListener('mouseenter', function() {
    startTime = null;
    animationId = requestAnimationFrame(animate);
  });
  
  container.addEventListener('mouseleave', function() {
    if (animationId) {
      cancelAnimationFrame(animationId);
      animationId = null;
    }
  });
  
  // Soporte táctil
  container.addEventListener('touchstart', function() {
    startTime = null;
    animationId = requestAnimationFrame(animate);
  });
  
  container.addEventListener('touchend', function() {
    if (animationId) {
      cancelAnimationFrame(animationId);
      animationId = null;
    }
  });
})();
</script>
