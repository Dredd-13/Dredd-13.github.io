{{ if .IsHome }}
<script>
// ============================================
// TOGGLE DE TEMA (claro/oscuro)
// ============================================
(function() {
  const toggle = document.getElementById('theme-toggle');
  if (!toggle) return;
  
  // Detectar tema actual
  function getTheme() {
    if (localStorage.getItem('theme')) {
      return localStorage.getItem('theme');
    }
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  
  // Aplicar tema
  function setTheme(theme) {
    document.documentElement.classList.remove('dark', 'light');
    document.documentElement.classList.add(theme);
    document.body.classList.remove('dark', 'light');
    document.body.classList.add(theme);
    localStorage.setItem('theme', theme);
  }
  
  // Toggle al hacer clic
  toggle.addEventListener('click', function() {
    const currentTheme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    setTheme(newTheme);
  });
})();

// ============================================
// EFECTO ONDA BINARIA PARA ASCII ART
// ============================================
(function() {
  const container = document.getElementById('ascii-container');
  const asciiNormal = document.getElementById('ascii-normal');
  const asciiBinary = document.getElementById('ascii-binary');
  
  if (!container || !asciiNormal || !asciiBinary) return;
  
  const originalText = asciiNormal.textContent;
  let animationId = null;
  let startTime = null;
  
  function generateBinaryWave(time) {
    let result = '';
    let charIndex = 0;
    
    for (let i = 0; i < originalText.length; i++) {
      const char = originalText[i];
      
      if (char === ' ' || char === '\n') {
        result += char;
      } else {
        const wave = Math.sin((charIndex * 0.15) + (time * 0.004));
        if (wave > 0.3) {
          result += Math.random() > 0.5 ? '1' : '0';
        } else {
          result += char;
        }
        charIndex++;
      }
    }
    
    return result;
  }
  
  function animate(timestamp) {
    if (!startTime) startTime = timestamp;
    const elapsed = timestamp - startTime;
    
    asciiBinary.textContent = generateBinaryWave(elapsed);
    animationId = requestAnimationFrame(animate);
  }
  
  container.addEventListener('mouseenter', function() {
    startTime = null;
    animationId = requestAnimationFrame(animate);
  });
  
  container.addEventListener('mouseleave', function() {
    if (animationId) {
      cancelAnimationFrame(animationId);
      animationId = null;
    }
  });
  
  // Soporte táctil
  container.addEventListener('touchstart', function() {
    startTime = null;
    animationId = requestAnimationFrame(animate);
  });
  
  container.addEventListener('touchend', function() {
    if (animationId) {
      cancelAnimationFrame(animationId);
      animationId = null;
    }
  });
})();
</script>
{{ end }}
