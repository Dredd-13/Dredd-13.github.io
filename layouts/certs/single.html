{{- define "main" }}

<div class="whoami-page">
  <div class="terminal-container whoami-terminal" style="max-width: 900px; width: 90%; margin: 0 auto;">
    <div class="terminal-header">
      <div class="terminal-dots">
        <div class="terminal-dot dot-red"></div>
        <div class="terminal-dot dot-yellow"></div>
        <div class="terminal-dot dot-green"></div>
      </div>
      <span class="terminal-title">dredd@kali: ~/certs/{{ .File.BaseFileName }}</span>
    </div>
    <div class="terminal-body">
      
      <div class="terminal-line">
        <span class="prompt">dredd@kali:~$</span>
        <span class="command"> xdg-open ~/certs/{{ .File.BaseFileName }}.png</span>
      </div>
      
      <div class="terminal-spacer"></div>
      
      {{- if .Params.cover.image }}
      <div style="display: flex; justify-content: center; padding: 10px 0;">
        <img src="{{ .Params.cover.image }}" alt="{{ .Title }}" style="max-width: 100%; max-height: 550px; height: auto; border-radius: 4px;">
      </div>
      {{- end }}
      
      <div class="terminal-spacer"></div>
      
      <div class="terminal-line">
        <span class="prompt">dredd@kali:~$</span>
        <span class="command"> file {{ .File.BaseFileName }}.png</span>
      </div>
      <div class="output">{{ .Title }}: {{ .Description }}</div>
      
      <div class="terminal-spacer"></div>
      
      <div class="terminal-line">
        <span class="prompt">dredd@kali:~$</span>
        <span class="terminal-cursor"></span>
      </div>
      
    </div>
  </div>
</div>

{{- end }}
